<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Estructuras de Datos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <h1>Simulador de Estructuras de Datos</h1>
        <nav id="menu">
            <button data-structure="stack">Pila</button>
            <button data-structure="queue">Cola</button>
            <button data-structure="list">Lista</button>
            <button data-structure="tree">Árbol Binario</button>
        </nav>
        <div id="controls">
            <div id="insert-section" class="control-section">
                <input type="number" id="inputValue" placeholder="Valor">
                <button id="btnInsert">Insertar</button>
            </div>
            <div id="delete-section" class="control-section">
                <input type="number" id="inputDeleteValue" placeholder="Valor a eliminar">
                <button id="btnDelete">Eliminar</button>
            </div>
            <div id="queue-section" class="control-section">
                <input type="number" id="inputPosition" placeholder="Posición">
                <input type="number" id="inputQueueValue" placeholder="Valor">
                <button id="btnInsertAt">Insertar en posición</button>
                <button id="btnRemoveAt">Eliminar en posición</button>
            </div>
            <div id="list-section" class="control-section">
                <button id="btnInsertFirst">Insertar al inicio</button>
                <button id="btnInsertLast">Insertar al final</button>
                <input type="number" id="inputListPos" placeholder="Posición">
                <input type="number" id="inputListVal" placeholder="Valor">
                <button id="btnInsertListAt">Insertar en posición</button>
                <button id="btnDeleteListAt">Eliminar en posición</button>
                <button id="btnTraverseFwd">→ Recorrer adelante</button>
                <button id="btnTraverseBwd">← Recorrer atrás</button>
                <label id="lblDoubly">
                    <input type="checkbox" id="chkDoubly"> Lista doble
                </label>
            </div>
        </div>
        <div id="info-display"></div>
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <div id="explanation"></div>
    </div>
    <script src="js/stack.js"></script>
    <script src="js/queue.js"></script>
    <script src="js/list.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
